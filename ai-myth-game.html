<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Myth vs Reality</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f8f6;color:#1a1a1a;padding:1.5rem;min-height:100vh}
.game-wrap{max-width:620px;margin:0 auto}
h1{font-size:20px;font-weight:500;margin-bottom:4px;color:#1a1a1a}
.subtitle{font-size:14px;color:#666;margin-bottom:1.5rem}
.score-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.score-pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{font-size:13px;padding:4px 12px;border-radius:20px;font-weight:500;display:flex;align-items:center;gap:4px}
.pill.correct{background:#e6f9f0;color:#0a6640}
.pill.wrong{background:#fdeaea;color:#a02020}
.pill.remaining{background:#efefef;color:#555}
.streak-badge{font-size:12px;padding:3px 10px;border-radius:20px;background:#fff8e1;color:#7a5800;font-weight:500;display:none}
.progress-bar{height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:#378ADD;border-radius:2px;transition:width 0.4s}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-label{font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.statement{font-size:17px;font-weight:500;line-height:1.5;margin-bottom:1.25rem;color:#1a1a1a}
.btn-row{display:flex;gap:10px}
.choice-btn{flex:1;padding:10px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.15s,transform 0.1s;display:flex;align-items:center;justify-content:center;gap:6px}
.choice-btn:hover:not(:disabled){background:#f5f5f5}
.choice-btn:active:not(:disabled){transform:scale(0.98)}
.choice-btn.myth-btn{border-color:#E24B4A;color:#A32D2D}
.choice-btn.myth-btn:hover:not(:disabled){background:#fff5f5}
.choice-btn.reality-btn{border-color:#1D9E75;color:#0F6E56}
.choice-btn.reality-btn:hover:not(:disabled){background:#f0faf6}
.choice-btn:disabled{opacity:0.5;cursor:default}
.feedback{border-radius:8px;padding:1rem 1.25rem;margin-top:1rem;font-size:14px;line-height:1.6;display:none}
.feedback.correct-fb{background:#e6f9f0;border:1px solid #a3dfc0;color:#0a5c38}
.feedback.wrong-fb{background:#fdeaea;border:1px solid #f5b5b5;color:#8a1a1a}
.feedback-head{font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.next-btn{width:100%;margin-top:1rem;padding:11px;border-radius:8px;border:1px solid #d0d0d0;background:#f5f5f5;color:#1a1a1a;font-size:14px;font-weight:500;cursor:pointer;display:none}
.next-btn:hover{background:#ebebeb}
.result-card{text-align:center;padding:2rem 1.5rem;background:#fff;border:1px solid #e0e0e0;border-radius:12px;display:none}
.big-score{font-size:52px;font-weight:500;line-height:1;margin:0.5rem 0;color:#1a1a1a}
.result-label{font-size:15px;color:#666;margin-bottom:1.5rem}
.restart-btn{padding:10px 24px;border-radius:8px;border:1px solid #d0d0d0;background:#f5f5f5;color:#1a1a1a;font-size:14px;font-weight:500;cursor:pointer}
.restart-btn:hover{background:#ebebeb}
</style>
</head>
<body>
<div class="game-wrap">
  <h1>AI Myth vs Reality</h1>
  <p class="subtitle">Read each statement and decide: is it a myth or reality?</p>

  <div class="score-bar">
    <div style="font-size:13px;color:#888">AI Literacy · Lecture 1</div>
    <div class="score-pills">
      <span class="pill correct" id="correct-count">✓ 0</span>
      <span class="pill wrong" id="wrong-count">✗ 0</span>
      <span class="pill remaining" id="remaining-count">8 left</span>
      <span class="streak-badge" id="streak-badge"></span>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div id="question-area">
    <div class="card">
      <div class="card-label" id="q-num">Statement 1 of 8</div>
      <div class="statement" id="statement-text"></div>
      <div class="btn-row">
        <button class="choice-btn myth-btn" id="myth-btn" onclick="answer('myth')">🔥 Myth</button>
        <button class="choice-btn reality-btn" id="reality-btn" onclick="answer('reality')">✓ Reality</button>
      </div>
      <div class="feedback" id="feedback">
        <div class="feedback-head" id="fb-head"></div>
        <div id="fb-body"></div>
      </div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">Next statement →</button>
  </div>

  <div class="result-card" id="result-card">
    <div style="font-size:15px;color:#888;margin-bottom:4px">Final score</div>
    <div class="big-score" id="final-score"></div>
    <div class="result-label" id="result-label"></div>
    <button class="restart-btn" onclick="restart()">↺ Play again</button>
  </div>
</div>

<script>
const ITEMS=[
  {statement:"AI language models understand language the same way humans do.",answer:"myth",explanation:"LLMs predict statistically likely word sequences based on patterns in training data. They have no comprehension, beliefs, or lived experience — they process tokens, not meaning."},
  {statement:"AI systems can be free of bias if trained on enough data.",answer:"myth",explanation:"More data often amplifies existing societal biases rather than eliminating them. Bias in AI reflects the biases present in training data, problem framing, and design choices — it must be actively audited and addressed."},
  {statement:"Deep Blue won at chess by evaluating millions of possible moves per second.",answer:"reality",explanation:"Deep Blue used brute-force calculation combined with hand-coded chess knowledge to evaluate up to 200 million positions per second. It had no general intelligence — it was exceptional only at chess."},
  {statement:"AI will soon replace all human jobs across every industry.",answer:"myth",explanation:"AI automates specific tasks, not entire jobs. It reshapes the nature of work, but human judgment, creativity, ethics, and interpersonal skills remain critical in most fields."},
  {statement:"The Turing Test measures whether a machine can hold a conversation indistinguishable from a human.",answer:"reality",explanation:"Alan Turing proposed this in 1950 as the 'Imitation Game.' A human evaluator converses with both a human and a machine via text — if they can't reliably tell the two apart, the machine passes."},
  {statement:"Current AI systems have consciousness and self-awareness.",answer:"myth",explanation:"No current AI system has consciousness, feelings, or self-awareness. They are sophisticated pattern-matching systems. Claims of AI sentience are not supported by scientific evidence."},
  {statement:"Generative AI systems can produce content like text, images, and code.",answer:"reality",explanation:"Generative AI refers to systems that produce new content rather than just classify or predict. Tools like LLMs, image generators, and code assistants are all examples widely available since 2022."},
  {statement:"When an AI states a fact confidently, it is always accurate.",answer:"myth",explanation:"AI systems regularly 'hallucinate' — generating plausible-sounding but factually incorrect information with high confidence. Always verify important claims from AI against reliable sources."}
];

let shuffled=[],idx=0,correct=0,wrong=0,streak=0;
function shuffle(arr){return[...arr].sort(()=>Math.random()-0.5)}

function loadQ(){
  const item=shuffled[idx];
  document.getElementById('q-num').textContent=`Statement ${idx+1} of ${shuffled.length}`;
  document.getElementById('statement-text').textContent=item.statement;
  document.getElementById('feedback').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('myth-btn').disabled=false;
  document.getElementById('reality-btn').disabled=false;
  updateCounts();
}

function answer(choice){
  const item=shuffled[idx];
  const isCorrect=choice===item.answer;
  document.getElementById('myth-btn').disabled=true;
  document.getElementById('reality-btn').disabled=true;
  if(isCorrect){correct++;streak++;}else{wrong++;streak=0;}
  const fb=document.getElementById('feedback');
  fb.className='feedback '+(isCorrect?'correct-fb':'wrong-fb');
  document.getElementById('fb-head').textContent=isCorrect?'✓ Correct!':`✗ Not quite — this is a ${item.answer}.`;
  document.getElementById('fb-body').textContent=item.explanation;
  fb.style.display='block';
  const sb=document.getElementById('streak-badge');
  if(streak>=2){sb.textContent=`${streak} in a row!`;sb.style.display='inline-block';}else{sb.style.display='none';}
  updateCounts();
  const nb=document.getElementById('next-btn');
  nb.style.display='block';
  nb.textContent=idx===shuffled.length-1?'See results →':'Next statement →';
}

function updateCounts(){
  document.getElementById('correct-count').textContent=`✓ ${correct}`;
  document.getElementById('wrong-count').textContent=`✗ ${wrong}`;
  const answered=document.getElementById('next-btn').style.display==='block'?1:0;
  document.getElementById('remaining-count').textContent=`${Math.max(0,shuffled.length-idx-answered)} left`;
  document.getElementById('progress').style.width=`${(idx/shuffled.length)*100}%`;
}

function nextQ(){
  idx++;
  if(idx>=shuffled.length){showResult();return;}
  loadQ();
}

function showResult(){
  document.getElementById('question-area').style.display='none';
  document.getElementById('progress').style.width='100%';
  const rc=document.getElementById('result-card');
  rc.style.display='block';
  const pct=Math.round((correct/shuffled.length)*100);
  document.getElementById('final-score').textContent=`${correct}/${shuffled.length}`;
  const labels=[[100,'Perfect score! You could teach this class.'],[75,'Strong work — you have solid AI literacy.'],[50,'Good start — a couple of these are tricky.'],[0,'Keep going — these myths fool a lot of people!']];
  document.getElementById('result-label').textContent=labels.find(([t])=>pct>=t)[1];
  document.getElementById('remaining-count').textContent='done';
}

function restart(){
  idx=0;correct=0;wrong=0;streak=0;
  shuffled=shuffle(ITEMS);
  document.getElementById('result-card').style.display='none';
  document.getElementById('question-area').style.display='block';
  document.getElementById('streak-badge').style.display='none';
  loadQ();
}

shuffled=shuffle(ITEMS);loadQ();
</script>
</body>
</html>
